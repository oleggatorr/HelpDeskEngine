services:
  db:
    image: postgres:16-alpine
    container_name: helpdesk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"  # Доступ к БД снаружи: 5433 -> 5432 внутри контейнера
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - helpdesk_net

  app:
    build: .
    container_name: helpdesk_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      # DB_PORT в .env оставляем 5432! Контейнеры общаются внутри сети по стандартному порту.
    ports:
      - "8002:8000"  # Доступ к API снаружи: 8002 -> 8000 внутри контейнера
    depends_on:
      db:
        condition: service_healthy
    networks:
      - helpdesk_net

volumes:
  postgres_data:

networks:
  helpdesk_net:
    driver: bridge