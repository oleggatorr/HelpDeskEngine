<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Help Desk Engine" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

{# Навигация #}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Help Desk Engine</a>
        <div class="d-flex align-items-center gap-2">
            {% if current_user %}
            <span class="navbar-text text-light me-2">{{ current_user.full_name or current_user.login }}</span>
            <a href="/messages" class="btn btn-outline-light btn-sm">Сообщения</a>
            <a href="/auth/logout" class="btn btn-outline-danger btn-sm">Выйти</a>
            {% else %}
            <a href="/auth/login-page" class="btn btn-outline-light btn-sm">Войти</a>
            <a href="/auth/register-page" class="btn btn-light btn-sm">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>
